name: Sincronització Manual de la Wiki

on:
  workflow_dispatch: # Activa el botó manual a la web de GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. Descarrega el teu repositori actual (mtuoc-course)
      - name: Checkout el meu Pages
        uses: actions/checkout@v4

      # 2. Descarrega la wiki del repositori MTUOC
      - name: Checkout Wiki externa
        uses: actions/checkout@v4
        with:
          repository: mtuoc/MTUOC-Machine-Translation-Practical-Course.wiki
          path: wiki-temporal

      # 3. Copia el contingut de la wiki a la carpeta del Mòdul 1
      - name: Copiar fitxers a la carpeta del Mòdul 1
        run: |
          mkdir -p wiki/modul-1
          rsync -av --delete --exclude='.git' wiki-temporal/ wiki/modul-1/

      # 4. Puja els canvis de tornada al teu repositori de GitHub (a la branca gh-pages)
      - name: Commit i Push dels canvis
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/modul-1/
          if ! git diff --cached --quiet; then
            git commit -m "docs: sincronització de la wiki al Mòdul 1"
            git push origin HEAD:gh-pages # <-- AIXÒ ÉS EL CANVI CLAU
          else
            echo "No s'ha detectat cap canvi nou a la wiki."
          fi
