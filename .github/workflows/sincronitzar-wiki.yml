name: Sincronització de la Wiki

on:
  workflow_dispatch: # Botó manual a la web de GitHub
  schedule:
    - cron: '0 0 * * *' # S'executarà sol cada dia a les 12 de la nit

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. Descarrega el teu repositori principal
      - name: Checkout el meu repositori
        uses: actions/checkout@v4
        with:
          ref: main

      # 2. Configura Python al servidor
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. Executa el teu script de Python (qui fa tota la feina bruta i corregeix els links)
      - name: Executar script de sincronització i correcció
        run: |
          python sync_wiki.py

      # 4. Puja els fitxers corregits al teu repositori (això activarà el deploy automàticament)
      - name: Commit i Push dels canvis
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/module-1/
          if ! git diff --cached --quiet; then
            git commit -m "docs: sincronització automàtica i correcció d'enllaços de la Wiki"
            git push origin main
          else
            echo "No s'ha detectat cap canvi nou a la Wiki."
          fi
